# DO NOT commit real values — this is a template.
# Apply with: kubectl apply -f k8s/secrets.yaml
#
# Or create directly:
#   kubectl create secret generic retro14-secrets \
#     --namespace retro14 \
#     --from-literal=supabase-url=https://<project>.supabase.co \
#     --from-literal=supabase-anon-key=<anon-key>

apiVersion: v1
kind: Secret
metadata:
  name: retro14-secrets
  namespace: retro14
type: Opaque
stringData:
  # Internal URL — Supabase runs in the same cluster via Helm
  supabase-url: "http://supabase-kong.retro14.svc.cluster.local:8000"
  supabase-anon-key: "<anon-key>"  # must match the key used in the Helm install
