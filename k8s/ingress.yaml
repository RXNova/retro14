apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retro14-ingress
  namespace: retro14
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: retro14.yourdomain.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: retro14-app
                port:
                  number: 80
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - retro14.yourdomain.com
  #     secretName: retro14-tls
